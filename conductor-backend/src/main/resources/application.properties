spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/conductor}
spring.datasource.username=${DATABASE_USERNAME:conductor}
spring.datasource.password=${DATABASE_PASSWORD:conductor}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
jwt.secret=${JWT_SECRET:test-secret-key-must-be-at-least-32-chars-long}
jwt.expiry-hours=${JWT_EXPIRY_HOURS:24}
firebase.service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY:}
resend.api-key=${RESEND_API_KEY:}
gcp.storage.bucket-name=${GCP_STORAGE_BUCKET_NAME}
gcp.service-account-key=${GCP_SERVICE_ACCOUNT_KEY:}
gcp.signed-url.expiry-minutes=${GCP_SIGNED_URL_EXPIRY_MINUTES:15}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
frontend.url=${FRONTEND_URL:http://localhost:3000}
