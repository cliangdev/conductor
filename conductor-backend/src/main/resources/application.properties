spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/conductor}
spring.datasource.username=${DATABASE_USERNAME:conductor}
spring.datasource.password=${DATABASE_PASSWORD:conductor}

# HikariCP — keep pool small when fronted by PgBouncer
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Hibernate — disable server-side prepared statements for PgBouncer transaction mode
spring.jpa.properties.hibernate.criteria.literal_handling_mode=INLINE
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${APP_JWT_SECRET:test-secret-key-must-be-at-least-32-chars-long}
jwt.expiry-hours=${JWT_EXPIRY_HOURS:24}
firebase.service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY:}
resend.api-key=${RESEND_API_KEY:}
gcp.storage.bucket-name=${GCP_STORAGE_BUCKET_NAME}
gcp.service-account-key=${GCP_SERVICE_ACCOUNT_KEY:}
gcp.signed-url.expiry-minutes=${GCP_SIGNED_URL_EXPIRY_MINUTES:15}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
frontend.url=${FRONTEND_URL:http://localhost:3000}
