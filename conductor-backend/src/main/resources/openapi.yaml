components:
  responses:
    Forbidden:
      description: Caller is not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: http
      scheme: bearer
      description: API key authentication (Bearer token)

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    FirebaseLoginRequest:
      type: object
      required:
        - idToken
      properties:
        idToken:
          type: string
          description: Firebase ID token obtained from client-side Firebase SDK

    AuthResponse:
      type: object
      required:
        - accessToken
        - user
      properties:
        accessToken:
          type: string
          description: JWT access token for subsequent API calls
        user:
          $ref: "#/components/schemas/UserSummary"

    UserSummary:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string

    UserProfile:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
        displayName:
          type: string

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        code:
          type: string

    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
          description: Project name (required, max 100 chars)
        description:
          type: string
          description: Optional project description

    ProjectResponse:
      type: object
      required:
        - id
        - name
        - key
        - createdBy
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Short uppercase project identifier (e.g. "COND")
        description:
          type: string
        createdBy:
          type: string
          description: User ID of the creator
        createdAt:
          type: string
          format: date-time

    ProjectSummary:
      type: object
      required:
        - id
        - name
        - key
        - role
        - memberCount
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Short uppercase project identifier (e.g. "COND")
        description:
          type: string
        role:
          type: string
          description: Caller's role in this project
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ProjectDetail:
      type: object
      required:
        - id
        - name
        - key
        - createdBy
        - memberCount
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        key:
