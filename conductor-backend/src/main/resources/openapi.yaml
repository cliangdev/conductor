components:
  responses:
    Forbidden:
      description: Caller is not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: http
      scheme: bearer
      description: API key authentication (Bearer token)

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    FirebaseLoginRequest:
      type: object
      required:
        - idToken
      properties:
        idToken:
          type: string
          description: Firebase ID token obtained from client-side Firebase SDK

    AuthResponse:
      type: object
      required:
        - accessToken
        - user
      properties:
        accessToken:
          type: string
          description: JWT access token for subsequent API calls
        user:
          $ref: "#/components/schemas/UserSummary"

    UserSummary:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string

    UserProfile:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
        displayName:
          type: string

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        code:
          type: string

    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
          description: Project name (required, max 100 chars)
        description:
          type: string
          description: Optional project description

    ProjectResponse:
      type: object
      required:
        - id
        - name
        - createdBy
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        createdBy:
          type: string
          description: User ID of the creator
        createdAt:
          type: string
          format: date-time

    ProjectSummary:
      type: object
      required:
        - id
        - name
        - role
        - memberCount
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        role:
          type: string
          description: Caller's role in this project
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ProjectDetail:
      type: object
      required:
        - id
        - name
        - createdBy
        - memberCount
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        createdBy:
          type: string
          description: User ID of the creator
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    MemberResponse:
      type: object
      required:
        - userId
        - role
        - joinedAt
      properties:
        userId:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
        joinedAt:
          type: string
          format: date-time

    UpdateMemberRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          description: New role for the member

    CreateInviteRequest:
      type: object
      required:
        - email
        - role
      properties:
        email:
          type: string
          format: email
          description: Email address to invite
        role:
          type: string
          description: Role to assign (CREATOR or REVIEWER)

    InviteResponse:
      type: object
      required:
        - id
        - email
        - role
        - expiresAt
      properties:
        id:
          type: string
        token:
          type: string
          description: Invite token used to accept the invite
        email:
          type: string
        role:
          type: string
        status:
          type: string
        expiresAt:
          type: string
          format: date-time

    AcceptInviteResponse:
      type: object
      required:
        - projectId
        - projectName
        - role
      properties:
        projectId:
          type: string
        projectName:
          type: string
        role:
          type: string

    IssueType:
      type: string
      enum:
        - PRD
        - FEATURE_REQUEST
        - BUG_REPORT

    IssueStatus:
      type: string
      enum:
        - DRAFT
        - IN_REVIEW
        - APPROVED
        - CHANGES_REQUESTED
        - ARCHIVED

    IssueResponse:
