name: PR Deploy Preview

on:
  pull_request:
    types: [labeled]

jobs:
  build-and-test-backend:
    if: contains(github.event.pull_request.labels.*.name, 'deploy-backend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        working-directory: conductor-backend
        env:
          WORKFLOW_SECRETS_KEY: dGVzdC1rZXktZm9yLWNpLW9ubHktMzItYnl0ZXMhIXg=
        run: mvn test

  deploy-backend:
    needs: build-and-test-backend
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-cloudrun.yml
    with:
      service: conductor-backend
      image-name: backend
      build-context: conductor-backend/
      cloudrun-secrets: |
        DATABASE_URL=DATABASE_URL:latest
        DATABASE_USERNAME=DATABASE_USERNAME:latest
        DATABASE_PASSWORD=DATABASE_PASSWORD:latest
        APP_JWT_SECRET=APP_JWT_SECRET:latest
        FIREBASE_SERVICE_ACCOUNT_KEY=FIREBASE_SERVICE_ACCOUNT_KEY:latest
        RESEND_API_KEY=RESEND_API_KEY:latest
        GCP_SERVICE_ACCOUNT_KEY=GCP_SERVICE_ACCOUNT_KEY:latest
        GCP_STORAGE_BUCKET_NAME=GCP_STORAGE_BUCKET_NAME:latest
        FRONTEND_URL=FRONTEND_URL:latest
        WORKFLOW_SECRETS_KEY=WORKFLOW_SECRETS_KEY:latest
    secrets: inherit

  build-and-test-frontend:
    if: contains(github.event.pull_request.labels.*.name, 'deploy-frontend')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conductor-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: conductor-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  deploy-frontend:
    needs: build-and-test-frontend
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-cloudrun.yml
    with:
      service: conductor-frontend
      image-name: frontend
      build-context: conductor-frontend/
      is-frontend: true
      cloudrun-flags: --allow-unauthenticated
    secrets: inherit
