name: PR Deploy Preview

on:
  pull_request:
    types: [labeled]

jobs:
  build-and-test-backend:
    if: github.event.label.name == 'deploy-backend'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        working-directory: conductor-backend
        env:
          WORKFLOW_SECRETS_KEY: dGVzdC1rZXktZm9yLWNpLW9ubHktMzItYnl0ZXMhIXg=
        run: mvn test

  deploy-backend:
    needs: build-and-test-backend
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-cloudrun.yml
    with:
      service: conductor-backend
      image-name: backend
      build-context: conductor-backend/
      cloudrun-secrets: |
        DATABASE_URL=DATABASE_URL:latest
        DATABASE_USERNAME=DATABASE_USERNAME:latest
        DATABASE_PASSWORD=DATABASE_PASSWORD:latest
        APP_JWT_SECRET=APP_JWT_SECRET:latest
        FIREBASE_SERVICE_ACCOUNT_KEY=FIREBASE_SERVICE_ACCOUNT_KEY:latest
        RESEND_API_KEY=RESEND_API_KEY:latest
        GCP_SERVICE_ACCOUNT_KEY=GCP_SERVICE_ACCOUNT_KEY:latest
        GCP_STORAGE_BUCKET_NAME=GCP_STORAGE_BUCKET_NAME:latest
        FRONTEND_URL=FRONTEND_URL:latest
        WORKFLOW_SECRETS_KEY=WORKFLOW_SECRETS_KEY:latest
    secrets: inherit

  build-and-test-frontend:
    if: github.event.label.name == 'deploy-frontend'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conductor-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: conductor-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  deploy-frontend:
    needs: build-and-test-frontend
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-cloudrun.yml
    with:
      service: conductor-frontend
      image-name: frontend
      build-context: conductor-frontend/
      is-frontend: true
      cloudrun-flags: --allow-unauthenticated
    secrets: inherit

  notify-backend:
    needs: deploy-backend
    if: always() && github.event.label.name == 'deploy-backend'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.deploy-backend.result }}' === 'success';
            const icon = success ? '✅' : '❌';
            const statusText = success ? 'succeeded' : 'failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.payload.repository.html_url}/commit/${context.sha}`;
            const shortSha = context.sha.slice(0, 7);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                `## ${icon} Backend deployment ${statusText}`,
                '',
                `| | |`,
                `|---|---|`,
                `| **Commit** | [\`${shortSha}\`](${commitUrl}) |`,
                `| **Run** | [View logs](${runUrl}) |`,
                `| **Time** | ${new Date().toUTCString()} |`,
              ].join('\n'),
            });

  notify-frontend:
    needs: deploy-frontend
    if: always() && github.event.label.name == 'deploy-frontend'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.deploy-frontend.result }}' === 'success';
            const icon = success ? '✅' : '❌';
            const statusText = success ? 'succeeded' : 'failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.payload.repository.html_url}/commit/${context.sha}`;
            const shortSha = context.sha.slice(0, 7);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                `## ${icon} Frontend deployment ${statusText}`,
                '',
                `| | |`,
                `|---|---|`,
                `| **Commit** | [\`${shortSha}\`](${commitUrl}) |`,
                `| **Run** | [View logs](${runUrl}) |`,
                `| **Time** | ${new Date().toUTCString()} |`,
              ].join('\n'),
            });
