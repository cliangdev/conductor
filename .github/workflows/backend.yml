name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'conductor-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'conductor-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        working-directory: conductor-backend
        run: mvn test

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t conductor-backend ./conductor-backend
