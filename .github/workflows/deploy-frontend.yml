name: deploy_ui

on:
  workflow_run:
    workflows: [Frontend CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'pull_request' && github.event.label.name == 'deploy_ui')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Build and push image
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/conductor/frontend:${{ github.sha }}
          docker build -t $IMAGE conductor-frontend/
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: conductor-frontend
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: --allow-unauthenticated
