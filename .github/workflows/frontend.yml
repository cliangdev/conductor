name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'conductor-frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'conductor-frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conductor-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: conductor-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    uses: ./.github/workflows/deploy-cloudrun.yml
    with:
      service: conductor-frontend
      image-name: frontend
      build-context: conductor-frontend/
      is-frontend: true
      cloudrun-flags: --allow-unauthenticated
    secrets: inherit
