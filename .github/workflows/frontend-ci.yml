name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'conductor-frontend/**'

jobs:
  build-and-test:
    name: frontend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conductor-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: conductor-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
