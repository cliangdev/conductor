name: Frontend CD

on:
  push:
    branches: [main]
    paths:
      - 'conductor-frontend/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conductor-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: conductor-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  deploy-frontend:
    needs: build-and-test
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-cloudrun.yml
    with:
      service: conductor-frontend
      image-name: frontend
      build-context: conductor-frontend/
      is-frontend: true
      cloudrun-flags: --allow-unauthenticated
    secrets: inherit
