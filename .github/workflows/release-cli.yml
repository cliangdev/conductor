name: Release CLI

on:
  push:
    branches: [main]
    paths:
      - 'conductor-tools/package.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # tag push + gh release create
      id-token: write       # npm publish --provenance
    defaults:
      run:
        working-directory: conductor-tools
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: conductor-tools/package-lock.json

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version is already released
        id: tag
        working-directory: ${{ github.workspace }}
        run: |
          if git rev-parse "cli-v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::cli-v${{ steps.pkg.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.tag.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.tag.outputs.exists == 'false'
        run: npm test

      - name: Build
        if: steps.tag.outputs.exists == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.tag.outputs.exists == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag and create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "cli-v${{ steps.pkg.outputs.version }}"
          git push origin "cli-v${{ steps.pkg.outputs.version }}"
          gh release create "cli-v${{ steps.pkg.outputs.version }}" \
            --generate-notes \
            --title "CLI v${{ steps.pkg.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
