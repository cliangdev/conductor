name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'conductor-backend/**'

jobs:
  build-and-test:
    name: backend-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        working-directory: conductor-backend
        env:
          WORKFLOW_SECRETS_KEY: dGVzdC1rZXktZm9yLWNpLW9ubHktMzItYnl0ZXMhIXg=
        run: mvn test
